services:
  - type: cron
    name: creator-radar-notify
    runtime: node
    branch: main
    buildCommand: bash build.sh
    schedule: "*/30 * * * *"
    startCommand: node worker.js
    envVars:
      - key: APIFY_API_TOKEN
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
      # Required for cross-run dedup on Render (Upstash Redis)
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: SEEN_STORE_REDIS_KEY
        value: creator-radar:seen
